<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Notices | DJPS</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .notice-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h4 { color: #D4AF37; margin: 0 0 10px 0; }
    </style>
</head>
<body>
    <h1>Latest School Notices</h1>
    <div id="publicNoticesList">Loading notices...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWixU7YycVXE7T6mo51Ym6OO_yMfZ8SM0",
            authDomain: "djps-website-3a826.firebaseapp.com",
            projectId: "djps-website-3a826"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchNotices() {
            const list = document.getElementById('publicNoticesList');
            const q = query(collection(db, "Notices"), orderBy("timestamp", "desc"));
            const snapshot = await getDocs(q);
            list.innerHTML = ""; // Clear loader
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="notice-card">
                        <h4>${data.title}</h4>
                        <p>${data.description}</p>
                        ${data.link ? `<a href="${data.link}" target="_blank">View Link</a>` : ''}
                        <small>${new Date(data.timestamp.toDate()).toLocaleDateString()}</small>
                    </div>
                `;
            });
        }
        fetchNotices();
    </script>
</body>
</html>
