 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJPS | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; color: #333; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        * { box-sizing: border-box; }
        
        /* LOGIN SCREEN */
        #loginScreen { background: #fff; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .input-box input { width: 100%; padding: 15px; margin-bottom: 20px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Poppins'; }
        .input-box input:focus { border-color: #D4AF37; }
        .btn { width: 100%; padding: 15px; background: #1a202c; color: #fff; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #D4AF37; color: #000; }
        
        /* DASHBOARD SCREEN */
        #dashboardScreen { display: none; width: 100%; max-width: 800px; margin: auto; }
        
        /* FRIENDLY AVATAR HEADER */
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); flex-wrap: wrap; gap: 20px; }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 60px; height: 60px; background: linear-gradient(135deg, #D4AF37, #e8c454); color: #fff; font-size: 1.8rem; font-weight: 600; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
        .user-info h2 { margin: 0; font-size: 1.4rem; color: #1a202c; }
        .user-info p { margin: 0; color: #888; font-size: 0.9rem; }
        .header-actions { display: flex; gap: 10px; }
        .btn-outline { padding: 10px 20px; border: 1px solid #ddd; background: #fff; border-radius: 8px; color: #333; text-decoration: none; font-size: 0.9rem; cursor: pointer; transition: 0.3s; }
        .btn-outline:hover { background: #f9f9f9; border-color: #ccc; }
        
        /* PANELS */
        .panel { background: #fff; padding: 30px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .panel h3 { margin-top: 0; color: #1a202c; font-size: 1.2rem; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .admin-input, .admin-textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Poppins'; }
        .admin-textarea { height: 120px; resize: vertical; }
        
        #statusMsg { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: #4CAF50; color: #fff; font-weight: 500; border-radius: 8px; display: none; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        @media (max-width: 600px) { .admin-header { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>

    <div id="statusMsg"><i class="fas fa-check-circle"></i> Update Successful!</div>

    <div id="loginScreen">
        <h2 style="font-family: 'Playfair Display', serif; color: #1a202c;">Admin Login</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px;">Divya Jyoti Public School</p>
        
        <div class="input-box"><input type="text" id="phone" placeholder="Phone Number"></div>
        <div class="input-box"><input type="password" id="pass" placeholder="Password"></div>
        <p id="errorMsg" style="color: red; font-size: 0.85rem; display: none; margin-bottom: 15px;">Incorrect Credentials</p>
        
        <button class="btn" onclick="checkLogin()">Login</button>
        <a href="index.html" style="color: #888; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 20px;">Back to Home</a>
    </div>

    <div id="dashboardScreen">
        
        <!-- FRIENDLY HEADER -->
        <div class="admin-header">
            <div class="user-profile">
                <div class="avatar">S</div>
                <div class="user-info">
                    <h2>Welcome, Shashwat</h2>
                    <p>Principal & Admin</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn-outline"><i class="fas fa-globe"></i> Go to Website</a>
                <button class="btn-outline" style="color: red;" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- NOTICE BOARD -->
        <div class="panel">
            <h3><i class="fas fa-bell" style="color:#D4AF37;"></i> Post New Update / Notice</h3>
            <p style="font-size: 0.85rem; color: #888; margin-top: -10px; margin-bottom: 20px;">This will immediately show on the public website's "New Updates" section.</p>
            
            <input type="text" id="noticeTitle" class="admin-input" placeholder="Title (e.g. Summer Vacation Announced)">
            <textarea id="noticeDesc" class="admin-textarea" placeholder="Write message details..."></textarea>
            <input type="text" id="noticeLink" class="admin-input" placeholder="Optional: Paste Image/PDF Link (UPSC Style)">
            
            <button class="btn" id="noticeBtn" onclick="publishNotice()">Publish Update</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWixU7YycVXE7T6mo51Ym6OO_yMfZ8SM0",
            authDomain: "djps-website-3a826.firebaseapp.com",
            projectId: "djps-website-3a826"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function showSuccess(msg) {
            const toast = document.getElementById('statusMsg'); 
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        window.publishNotice = async function() {
            const title = document.getElementById('noticeTitle').value;
            const desc = document.getElementById('noticeDesc').value;
            const link = document.getElementById('noticeLink').value;
            
            if(!title || !desc) { alert("Please fill Title and Description!"); return; }
            document.getElementById('noticeBtn').innerText = 'Publishing...';
            
            try {
                await addDoc(collection(db, "Notices"), { 
                    title: title, 
                    description: desc, 
                    link: link || "",
                    timestamp: serverTimestamp() 
                });
                showSuccess("Notice Posted Successfully!"); 
                document.getElementById('noticeTitle').value = '';
                document.getElementById('noticeDesc').value = '';
                document.getElementById('noticeLink').value = '';
            } catch (error) { alert("Error: " + error.message); }
            document.getElementById('noticeBtn').innerText = 'Publish Update';
        };
    </script>

    <script>
        function checkLogin() {
            if(document.getElementById('phone').value === '9935456145' && document.getElementById('pass').value === 'Divya_Jyoti_Public_School') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
            } else { document.getElementById('errorMsg').style.display = 'block'; }
        }
    </script>
</body>
</html>
