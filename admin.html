<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJPS | System Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020203; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* LOGIN SCREEN */
        #loginScreen { background: #0a0a0c; padding: 50px 40px; border: 1px solid #333; border-top: 4px solid #D4AF37; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .input-box input { width: 100%; padding: 15px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: #fff; border-radius: 4px; outline: none; font-family: 'Poppins', sans-serif; letter-spacing: 1px; }
        .input-box input:focus { border-color: #D4AF37; }
        .btn { width: 100%; padding: 15px; background: #D4AF37; color: #000; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #fff; }
        
        /* DASHBOARD SCREEN */
        #dashboardScreen { display: none; width: 100%; max-width: 800px; margin: auto; padding: 20px 0; }
        
        /* DAMDAR VIP HEADER (NO EMOJIS) */
        .vip-header { display: flex; justify-content: space-between; align-items: center; background: #0a0a0c; padding: 30px; border-radius: 8px; border-left: 5px solid #D4AF37; border-top: 1px solid #222; border-right: 1px solid #222; border-bottom: 1px solid #222; margin-bottom: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .vip-header p.clearance { color: #D4AF37; font-size: 0.75rem; font-weight: 600; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        .vip-header h2 { margin: 10px 0 0 0; color: #fff; font-family: 'Playfair Display', serif; font-size: 2rem; letter-spacing: 1px; text-transform: uppercase; }
        .vip-header p.role { color: #888; font-size: 0.85rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .logout-btn { background: transparent; color: #ff4757; border: 1px solid #ff4757; font-weight: 600; letter-spacing: 1px; padding: 10px 25px; border-radius: 4px; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.85rem; }
        .logout-btn:hover { background: #ff4757; color: #fff; }

        /* CONTROL PANELS */
        .panel { background: #0a0a0c; padding: 30px; border-radius: 8px; border: 1px solid #222; margin-bottom: 30px; }
        .panel h3 { color: #fff; margin-bottom: 25px; font-weight: 400; font-size: 1.2rem; letter-spacing: 1px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .admin-input, .admin-textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 4px; outline: none; font-family: 'Poppins', sans-serif; }
        .admin-input:focus, .admin-textarea:focus { border-color: #D4AF37; }
        .admin-textarea { height: 120px; resize: vertical; }
        
        #statusMsg { position: fixed; top: 30px; right: 30px; padding: 15px 30px; background: #D4AF37; color: #000; font-weight: 600; letter-spacing: 1px; border-radius: 4px; display: none; z-index: 9999; box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
        
        @media (max-width: 600px) { .vip-header { flex-direction: column; text-align: center; gap: 20px; } }
    </style>
</head>
<body>

    <!-- SYSTEM NOTIFICATION -->
    <div id="statusMsg">DATA SYNCED SUCCESSFULLY</div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <h2 style="color: #fff; font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 5px;">ADMINISTRATION</h2>
        <p style="color: #666; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px;">Divya Jyoti Public School</p>
        
        <div class="input-box"><input type="text" id="phone" placeholder="ADMIN ID" autocomplete="off"></div>
        <div class="input-box"><input type="password" id="pass" placeholder="SECURITY KEY"></div>
        <p id="errorMsg" style="color: #ff4757; font-size: 0.85rem; display: none; margin-bottom: 20px; letter-spacing: 1px;">ACCESS DENIED</p>
        
        <button class="btn" onclick="checkLogin()">AUTHORIZE SESSION</button>
        <a href="index.html" style="color: #555; text-decoration: none; font-size: 0.75rem; display: block; margin-top: 30px; letter-spacing: 1px; text-transform: uppercase;">Return to Public Portal</a>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboardScreen">
        
        <!-- DAMDAR VIP HEADER -->
        <div class="vip-header">
            <div>
                <p class="clearance">Security Clearance: Maximum</p>
                <h2>SHASHWAT PANDEY</h2>
                <p class="role">Principal & System Administrator</p>
            </div>
            <button class="logout-btn" onclick="location.reload()">TERMINATE SESSION</button>
        </div>

        <!-- LIVE NOTICE MANAGER -->
        <div class="panel">
            <h3>PUBLISH LIVE NOTICE</h3>
            <input type="text" id="noticeTitle" class="admin-input" placeholder="NOTICE TITLE (e.g. Urgent Holiday Announcement)">
            <textarea id="noticeDesc" class="admin-textarea" placeholder="ENTER NOTICE DETAILS HERE..."></textarea>
            <button class="btn" id="noticeBtn" onclick="publishNotice()">TRANSMIT TO LIVE WEBSITE</button>
        </div>

        <!-- GALLERY MANAGER -->
        <div class="panel">
            <h3>GALLERY DATABASE SYNC (FREE CLOUD)</h3>
            <p style="font-size: 0.8rem; color: #888; margin-top: -15px; margin-bottom: 20px; letter-spacing: 1px;">PASTE DIRECT IMAGE URL FROM HOSTING PROVIDER</p>
            <input type="text" id="galleryLink" class="admin-input" placeholder="HTTPS://... (DIRECT IMAGE LINK)">
            <input type="text" id="imageCaption" class="admin-input" placeholder="IMAGE CAPTION">
            <button class="btn" id="uploadBtn" style="background: #222; color: #fff; border: 1px solid #444;" onclick="uploadPhotoLink()" onmouseover="this.style.background='#D4AF37'; this.style.color='#000';" onmouseout="this.style.background='#222'; this.style.color='#fff';">SYNC TO GALLERY DATABASE</button>
        </div>
    </div>

    <!-- FIREBASE SYSTEM LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your API Credentials
        const firebaseConfig = {
            apiKey: "AIzaSyDWixU7YycVXE7T6mo51Ym6OO_yMfZ8SM0",
            authDomain: "djps-website-3a826.firebaseapp.com",
            projectId: "djps-website-3a826",
            storageBucket: "djps-website-3a826.firebasestorage.app",
            messagingSenderId: "966697758842",
            appId: "1:966697758842:web:b6757776c73f9feddf0bc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function showSuccess() {
            const toast = document.getElementById('statusMsg'); 
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        window.publishNotice = async function() {
            const title = document.getElementById('noticeTitle').value;
            const desc = document.getElementById('noticeDesc').value;
            
            if(!title || !desc) {
                alert("SYSTEM HALTED: MISSING INFORMATION");
                return;
            }
            
            document.getElementById('noticeBtn').innerText = 'TRANSMITTING...';
            
            try {
                await addDoc(collection(db, "Notices"), { 
                    title, 
                    description: desc, 
                    timestamp: serverTimestamp() 
                });
                showSuccess(); 
                document.getElementById('noticeTitle').value = '';
                document.getElementById('noticeDesc').value = '';
            } catch (error) {
                alert("ERROR: " + error.message);
            }
            
            document.getElementById('noticeBtn').innerText = 'TRANSMIT TO LIVE WEBSITE';
        };

        window.uploadPhotoLink = async function() {
            const link = document.getElementById('galleryLink').value;
            const caption = document.getElementById('imageCaption').value;
            
            if(!link) {
                alert("SYSTEM HALTED: IMAGE URL REQUIRED");
                return;
            }
            
            document.getElementById('uploadBtn').innerText = 'SYNCING...';
            
            try {
                await addDoc(collection(db, "GalleryImages"), { 
                    imageUrl: link, 
                    caption, 
                    timestamp: serverTimestamp() 
                });
                showSuccess(); 
                document.getElementById('galleryLink').value = '';
                document.getElementById('imageCaption').value = '';
            } catch (error) {
                alert("ERROR: " + error.message);
            }
            
            document.getElementById('uploadBtn').innerText = 'SYNC TO GALLERY DATABASE';
        };
    </script>

    <!-- OFFLINE SECURITY CHECK -->
    <script>
        function checkLogin() {
            const id = document.getElementById('phone').value;
            const key = document.getElementById('pass').value;
            
            if(id === '9935456145' && key === 'Divya_Jyoti_Public_School') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
            } else { 
                document.getElementById('errorMsg').style.display = 'block'; 
            }
        }
    </script>
</body>
</html>
