<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | DJPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050508; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        nav { display: flex; justify-content: space-between; align-items:center; padding: 20px 5%; background: rgba(5,5,8,0.9); border-bottom: 1px solid rgba(212,175,55,0.2); position:fixed; width:100%; z-index:1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight:800; } 
        .logo span { color: #D4AF37; font-size: 0.6rem; display: block; letter-spacing: 3px; }
        .back-btn { color: #D4AF37; text-decoration: none; font-size: 0.9rem; font-weight: 500; border: 1px solid #D4AF37; padding: 8px 15px; border-radius: 20px; }
        
        .contact-container { padding: 150px 5% 50px 5%; max-width: 900px; margin: auto; text-align: center; }
        .contact-container h2 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); color: #fff; margin-bottom: 10px; }
        .contact-container h2 span { color: #D4AF37; font-style: italic; }
        
        .glass-box { background: linear-gradient(145deg, rgba(20,25,35,0.7), rgba(5,8,15,0.5)); border: 1px solid rgba(212,175,55,0.2); border-radius: 20px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-top: 40px; display: flex; flex-direction: column; gap: 30px; text-align: left; }
        
        .contact-item { display: flex; align-items: flex-start; gap: 20px; }
        .contact-icon { width: 50px; height: 50px; background: rgba(212,175,55,0.1); color: #D4AF37; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; flex-shrink: 0; }
        .contact-info h4 { margin: 0 0 5px 0; color: #D4AF37; font-size: 1.1rem; }
        .contact-info p, .contact-info a { margin: 0; color: #ccc; font-size: 1rem; text-decoration: none; transition: 0.3s; }
        .contact-info a:hover { color: #D4AF37; }
        
        .map-btn { display: inline-block; padding: 15px 30px; background: linear-gradient(135deg, #e8c454, #b59223); color: #000; font-weight: bold; text-decoration: none; border-radius: 50px; margin-top: 20px; transition: 0.3s; }
        .map-btn:hover { box-shadow: 0 10px 20px rgba(212,175,55,0.4); transform: translateY(-3px); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">DIVYA JYOTI <span>Public School</span></div>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
    </nav>

    <div class="contact-container">
        <h2>Get in <span>Touch</span></h2>
        <p style="color: #aaa;">We are always here to help you. Reach out to us via phone, email, or visit our campus.</p>
        
        <div class="glass-box">
            <div class="contact-item">
                <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="contact-info">
                    <h4>Campus Address</h4>
                    <p>FQ57+CGG, Kolhuwa, Beldand Road, Chandauli, UP 274001</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon"><i class="fas fa-phone-alt"></i></div>
                <div class="contact-info">
                    <h4>Phone Number</h4>
                    <a href="tel:+919935456145">+91 99354 56145</a>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                <div class="contact-info">
                    <h4>Email Address</h4>
                    <a href="mailto:shashwat82@gmail.com">shashwat82@gmail.com</a>
                </div>
            </div>
            
            <div style="text-align: center;">
                <a href="https://maps.app.goo.gl/Bezzb2nUWTAFxp5g6?g_st=ac" target="_blank" class="map-btn"><i class="fas fa-location-arrow"></i> Open in Google Maps</a>
            </div>
        </div>
    </div>
</body>
</html>
